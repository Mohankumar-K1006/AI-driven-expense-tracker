<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – ExpenseTracker</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg);
        }
        .auth-wrapper {
            display: flex;
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: auto;
        }
        .auth-form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 40px;
        }
        .auth-form-panel h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .auth-form-panel .sub {
            font-size: .9rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .auth-form-panel form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .auth-form-panel input {
            padding: 13px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-size: .95rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .auth-form-panel input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .auth-form-panel .btn {
            padding: 13px;
            font-size: 1rem;
            border-radius: var(--radius-sm);
            margin-top: 4px;
        }
        .auth-footer {
            margin-top: 20px;
            text-align: center;
            font-size: .9rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .success-text {
            color: green;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-form-panel">
            <h1>Reset your password</h1>
            <p class="sub">Enter the email address you used to register. We'll send you an email with a link to reset your password.</p>

            <form id="forgotPasswordForm">
                <input type="email" id="email" placeholder="Email address" required>
                <div id="message" class="message"></div>
                <button type="submit" class="btn btn-primary btn-full">Send Reset Link</button>
            </form>

            <div class="auth-footer">
                Remember your password? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById("forgotPasswordForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const msgEl = document.getElementById("message");
            msgEl.className = "message";
            msgEl.textContent = "";

            const btn = this.querySelector("button[type=submit]");
            btn.disabled = true;
            btn.textContent = "Sending…";

            try {
                const res = await fetch("http://localhost:5000/api/auth/forgot-password", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        email: document.getElementById("email").value
                    })
                });
                const data = await res.json();
                
                if (res.ok) {
                    msgEl.classList.add("success-text");
                    msgEl.textContent = data.message;

                    if (data.previewUrl) {
                        const linkContainer = document.createElement("div");
                        linkContainer.style.marginTop = "12px";
                        linkContainer.innerHTML = `<a href="${data.previewUrl}" target="_blank" style="color: var(--primary); font-weight: 600; text-decoration: underline; background: var(--primary-light); padding: 8px 12px; border-radius: 6px; display: inline-block;">View Sent Email (Test Mode)</a>`;
                        msgEl.appendChild(linkContainer);
                    }
                } else {
                    msgEl.classList.add("error");
                    msgEl.textContent = data.message || "Failed to send reset link.";
                }
            } catch {
                msgEl.classList.add("error");
                msgEl.textContent = "Network error. Check your connection.";
            } finally {
                btn.disabled = false;
                btn.textContent = "Send Reset Link";
            }
        });
    </script>
</body>
</html>
