<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard – ExpenseTracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="navbar.css">
    <style>
        .dash-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 920px;
            margin: 0 auto;
        }

        /* summary card spans full width */
        .summary-banner {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #fff;
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(37,99,235,.2);
        }

        .summary-banner h2 {
            font-size: 1rem;
            font-weight: 600;
            opacity: .9;
            margin-bottom: 4px;
        }

        .summary-banner .big-num {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .summary-stats {
            display: flex;
            gap: 32px;
            flex-wrap: wrap;
        }

        .stat {
            text-align: center;
        }

        .stat .label {
            font-size: .8rem;
            opacity: .8;
            margin-bottom: 2px;
        }

        .stat .val {
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* ── AI Suggestions Card ── */
        .suggestions-card {
            grid-column: 1 / -1;
        }

        .suggestions-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .suggestions-card h3 .ai-badge {
            font-size: .65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .8px;
            padding: 3px 10px;
            border-radius: 99px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
        }

        .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .suggestion-item {
            display: flex;
            gap: 14px;
            padding: 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--surface-2);
            transition: transform .15s, box-shadow .15s;
            animation: fadeInUp .4s ease both;
        }

        .suggestion-item:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .suggestion-item:nth-child(1) { animation-delay: 0s; }
        .suggestion-item:nth-child(2) { animation-delay: .08s; }
        .suggestion-item:nth-child(3) { animation-delay: .16s; }
        .suggestion-item:nth-child(4) { animation-delay: .24s; }
        .suggestion-item:nth-child(5) { animation-delay: .32s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .suggestion-icon {
            width: 40px;
            height: 40px;
            min-width: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .suggestion-icon.success { background: #dcfce7; color: #15803d; }
        .suggestion-icon.warning { background: #fef3c7; color: #92400e; }
        .suggestion-icon.danger  { background: #fee2e2; color: #b91c1c; }
        .suggestion-icon.info    { background: #dbeafe; color: #1e40af; }
        .suggestion-icon.tip     { background: #f0e7fe; color: #6d28d9; }

        .suggestion-body h4 {
            font-size: .9rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 2px;
        }

        .suggestion-body p {
            font-size: .85rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .suggestions-empty {
            text-align: center;
            padding: 24px;
            color: var(--text-muted);
            font-size: .9rem;
        }

        /* form & history cards span full width */
        .form-card,
        .history-card {
            grid-column: 1 / -1;
        }

        .form-card h3,
        .history-card h3 {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .form-row .span-full {
            grid-column: 1 / -1;
        }

        /* ── Transaction history list ── */
        .tx-list {
            list-style: none;
        }

        .tx-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }

        .tx-item:last-child {
            border-bottom: none;
        }

        .tx-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            min-width: 0;
        }

        .tx-info .tx-desc {
            font-weight: 600;
            font-size: .95rem;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tx-info .tx-meta {
            font-size: .8rem;
            color: var(--text-muted);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tx-amount {
            font-weight: 700;
            font-size: 1rem;
            white-space: nowrap;
        }

        .tx-amount.income {
            color: var(--success);
        }

        .tx-amount.expense {
            color: var(--danger);
        }

        .tx-delete {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            transition: background .15s;
            color: var(--text-muted);
        }

        .tx-delete:hover {
            background: #fee2e2;
            color: var(--danger);
        }

        .empty-tx {
            text-align: center;
            padding: 32px 16px;
            color: var(--text-muted);
            font-size: .9rem;
        }

        @media (max-width: 540px) {
            .dash-grid {
                grid-template-columns: 1fr;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="page-content">
        <h1 class="section-title">Dashboard</h1>
        <div class="dash-grid">

            <!-- Summary Banner -->
            <div class="summary-banner">
                <div>
                    <h2>Total Balance</h2>
                    <div class="big-num" id="balanceAmt">₹ —</div>
                </div>
                <div class="summary-stats">
                    <div class="stat">
                        <div class="label">Income</div>
                        <div class="val" id="totalIncome">₹ —</div>
                    </div>
                    <div class="stat">
                        <div class="label">Expenses</div>
                        <div class="val" id="totalExpense">₹ —</div>
                    </div>
                </div>
            </div>

            <!-- AI Suggestions -->
            <div class="card suggestions-card" id="suggestionsCard">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
                    Smart Insights
                    <span class="ai-badge">AI</span>
                </h3>
                <div class="suggestions-list" id="suggestionsList">
                    <div class="suggestions-empty">Analyzing your spending patterns...</div>
                </div>
            </div>

            <!-- Charts Section -->
            <div class="card form-card">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                    Analytics
                </h3>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px;">
                    <div>
                        <h4 style="text-align:center; color:var(--text-muted); margin-bottom: 10px;">Category Spending
                        </h4>
                        <div style="max-width: 250px; margin: 0 auto;">
                            <canvas id="dashPieChart"></canvas>
                        </div>
                    </div>
                    <div>
                        <h4 style="text-align:center; color:var(--text-muted); margin-bottom: 10px;">Monthly Trend</h4>
                        <div>
                            <canvas id="dashBarChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Add Transaction -->
            <div class="card form-card">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Transaction
                </h3>
                <form id="transactionForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="amount">Amount (₹)</label>
                            <input type="number" id="amount" placeholder="0.00" required min="0">
                        </div>
                        <div class="form-group">
                            <label for="date">Date</label>
                            <input type="date" id="date">
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <input type="text" id="description" placeholder="e.g. Lunch at cafe" required>
                        </div>
                        <div class="form-group">
                            <label for="account">Type</label>
                            <select id="account">
                                <option value="expense">Expense</option>
                                <option value="income">Income</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="category">Category</label>
                            <select id="category">
                                <option value="">Select category</option>
                                <option>Food</option>
                                <option>Travel</option>
                                <option>Shopping</option>
                                <option>Rent</option>
                                <option>Utilities</option>
                                <option>Entertainment</option>
                                <option>Salary</option>
                                <option>Other</option>
                            </select>
                        </div>
                        <div class="form-group span-full">
                            <div id="message" class="message"></div>
                            <input type="hidden" id="editTxId">
                            <button type="submit" id="submitTxBtn" class="btn btn-primary btn-full">Save Transaction</button>
                            <button type="button" id="cancelEditBtn" class="btn btn-outline btn-full" style="display:none; margin-top:10px;">Cancel Edit</button>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Recent Transactions -->
            <div class="card history-card">
                <h3>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    Recent Transactions
                </h3>
                <ul class="tx-list" id="txList">
                    <li class="empty-tx">Loading transactions…</li>
                </ul>
            </div>

        </div>
    </div>

    <script src="navbar.js"></script>
    <script>
        const token = localStorage.getItem("token");
        if (!token) window.location.href = "login.html";

        /* Set today as default date */
        document.getElementById("date").valueAsDate = new Date();

        /* ── SVG icons for suggestions ── */
        const suggestionIcons = {
            'trending-up': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>',
            'trending-down': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>',
            'alert-triangle': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>',
            'alert-circle': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
            'pie-chart': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>',
            'zap': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>',
            'dollar-sign': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
            'calendar': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
            'lightbulb': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 0-4 12.7V17h8v-2.3A7 7 0 0 0 12 2z"/></svg>',
            'rocket': '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="M12 15l-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>'
        };

        /* ── Load AI Suggestions ── */
        async function loadSuggestions() {
            try {
                const res = await fetch("http://localhost:8080/api/suggestions", {
                    headers: { "Authorization": token }
                });
                const suggestions = await res.json();
                const listEl = document.getElementById("suggestionsList");

                if (!suggestions.length) {
                    listEl.innerHTML = '<div class="suggestions-empty">No insights available yet. Keep tracking!</div>';
                    return;
                }

                listEl.innerHTML = suggestions.slice(0, 5).map(s => `
                    <div class="suggestion-item">
                        <div class="suggestion-icon ${s.type}">
                            ${suggestionIcons[s.icon] || suggestionIcons['lightbulb']}
                        </div>
                        <div class="suggestion-body">
                            <h4>${s.title}</h4>
                            <p>${s.message}</p>
                        </div>
                    </div>
                `).join("");
            } catch (err) {
                console.error("Failed to load suggestions", err);
                document.getElementById("suggestionsList").innerHTML =
                    '<div class="suggestions-empty">Could not load insights.</div>';
            }
        }

        /* ── Load Summary ── */
        async function loadSummary() {
            try {
                const res = await fetch("http://localhost:8080/api/transactions/summary", {
                    headers: { "Authorization": token }
                });
                const data = await res.json();
                document.getElementById("balanceAmt").textContent = "₹ " + (data.balance || 0).toLocaleString();
                document.getElementById("totalIncome").textContent = "₹ " + (data.totalIncome || 0).toLocaleString();
                document.getElementById("totalExpense").textContent = "₹ " + (data.totalExpense || 0).toLocaleString();
            } catch {
                console.error("Failed to load summary");
            }
        }

        /* ── Load Transactions ── */
        async function loadTransactions() {
            try {
                const res = await fetch("http://localhost:8080/api/transactions/all", {
                    headers: { "Authorization": token }
                });
                const transactions = await res.json();
                const list = document.getElementById("txList");

                if (!transactions.length) {
                    list.innerHTML = '<li class="empty-tx">No transactions yet. Add one above!</li>';
                    return;
                }

                list.innerHTML = "";
                transactions.forEach(tx => {
                    const dateStr = new Date(tx.date).toLocaleDateString("en-IN", {
                        day: "numeric", month: "short", year: "numeric"
                    });
                    const isIncome = tx.type === "income";
                    list.innerHTML += `
                    <li class="tx-item">
                        <div class="tx-info">
                            <span class="tx-desc">${tx.description || tx.category}</span>
                            <span class="tx-meta">
                                <span>${tx.category}</span>
                                <span>•</span>
                                <span>${dateStr}</span>
                            </span>
                        </div>
                        <span class="tx-amount ${tx.type}">${isIncome ? '+' : '-'}₹${tx.amount.toLocaleString()}</span>
                        <div style="display:flex; gap:6px;">
                            <button class="tx-delete" onclick='editTx(${JSON.stringify(tx).replace(/'/g, "&apos;")})' title="Edit"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg></button>
                            <button class="tx-delete" onclick="deleteTx('${tx._id}')" title="Delete"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                        </div>
                    </li>`;
                });
            } catch {
                document.getElementById("txList").innerHTML =
                    '<li class="empty-tx">Failed to load transactions.</li>';
            }
        }

        /* ── Edit Transaction ── */
        function editTx(tx) {
            document.getElementById("editTxId").value = tx._id;
            document.getElementById("amount").value = tx.amount;
            document.getElementById("date").value = tx.date.split("T")[0];
            document.getElementById("description").value = tx.description || "";
            document.getElementById("account").value = tx.type;
            document.getElementById("category").value = tx.category;

            const submitBtn = document.getElementById("submitTxBtn");
            const cancelBtn = document.getElementById("cancelEditBtn");
            submitBtn.textContent = "Update Transaction";
            cancelBtn.style.display = "block";

            const form = document.getElementById("transactionForm");
            form.scrollIntoView({ behavior: 'smooth', block: 'center' });

            form.style.boxShadow = "0 0 0 3px rgba(37,99,235,.2)";
            setTimeout(() => {
                form.style.boxShadow = "none";
            }, 1000);
        }

        /* ── Cancel Edit ── */
        document.getElementById("cancelEditBtn").addEventListener("click", () => {
            const form = document.getElementById("transactionForm");
            form.reset();
            document.getElementById("date").valueAsDate = new Date();
            document.getElementById("editTxId").value = "";
            document.getElementById("submitTxBtn").textContent = "Save Transaction";
            document.getElementById("cancelEditBtn").style.display = "none";
        });

        /* ── Delete Transaction ── */
        async function deleteTx(id) {
            if (!confirm("Delete this transaction?")) return;
            try {
                await fetch(`http://localhost:8080/api/transactions/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": token }
                });
                loadSummary();
                loadTransactions();
                loadSuggestions();
            } catch {
                alert("Failed to delete transaction.");
            }
        }

        /* ── Form submit ── */
        document.getElementById("transactionForm").addEventListener("submit", async function (e) {
            e.preventDefault();
            const msgEl = document.getElementById("message");
            msgEl.className = "message";
            msgEl.textContent = "";

            const btn = document.getElementById("submitTxBtn");
            const isEditing = !!document.getElementById("editTxId").value;
            btn.disabled = true;
            btn.textContent = isEditing ? "Updating…" : "Saving…";

            const txData = {
                type: document.getElementById("account").value,
                category: document.getElementById("category").value,
                amount: Number(document.getElementById("amount").value),
                description: document.getElementById("description").value,
                date: document.getElementById("date").value
            };

            try {
                let url = "http://localhost:8080/api/transactions/add";
                let method = "POST";

                if (isEditing) {
                    const id = document.getElementById("editTxId").value;
                    url = `http://localhost:8080/api/transactions/${id}`;
                    method = "PUT";
                }

                const res = await fetch(url, {
                    method: method,
                    headers: { "Content-Type": "application/json", "Authorization": token },
                    body: JSON.stringify(txData)
                });

                if (res.ok) {
                    msgEl.classList.add("success");
                    msgEl.textContent = isEditing ? "✔ Transaction updated!" : "✔ Transaction saved!";
                    this.reset();
                    document.getElementById("date").valueAsDate = new Date();
                    document.getElementById("editTxId").value = "";
                    document.getElementById("submitTxBtn").textContent = "Save Transaction";
                    document.getElementById("cancelEditBtn").style.display = "none";
                    loadSummary();
                    loadTransactions();
                    loadCharts();
                    loadSuggestions();
                } else {
                    const d = await res.json();
                    msgEl.classList.add("error");
                    msgEl.textContent = d.message || "Failed to save.";
                }
            } catch {
                msgEl.classList.add("error");
                msgEl.textContent = "Network error. Try again.";
            } finally {
                btn.disabled = false;
                if (!document.getElementById("editTxId").value) {
                     btn.textContent = "Save Transaction";
                }
            }
        });

        /* ── Load Charts ── */
        let pieChartInstance = null;
        let barChartInstance = null;

        async function loadCharts() {
            try {
                const catRes = await fetch("http://localhost:8080/api/analytics/category", {
                    headers: { "Authorization": token }
                });
                const catData = await catRes.json();

                if (catData.length > 0) {
                    const labels = catData.map(d => d._id || d.category);
                    const amounts = catData.map(d => d.total || d.amount);

                    if (pieChartInstance) pieChartInstance.destroy();
                    pieChartInstance = new Chart(document.getElementById("dashPieChart"), {
                        type: "doughnut",
                        data: {
                            labels: labels,
                            datasets: [{
                                data: amounts,
                                backgroundColor: ['#2563eb', '#06b6d4', '#059669', '#d97706', '#dc2626', '#7c3aed', '#ec4899', '#14b8a6', '#ea580c', '#65a30d'],
                                borderWidth: 2, borderColor: '#fff'
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, boxWidth: 8, color: '#64748b' } } }
                        }
                    });
                }

                const monRes = await fetch("http://localhost:8080/api/analytics/monthly", {
                    headers: { "Authorization": token }
                });
                const monData = await monRes.json();

                if (monData.length > 0) {
                    if (barChartInstance) barChartInstance.destroy();
                    barChartInstance = new Chart(document.getElementById("dashBarChart"), {
                        type: "bar",
                        data: {
                            labels: monData.map(d => d.month),
                            datasets: [{
                                label: "Expenses",
                                data: monData.map(d => d.expense),
                                backgroundColor: '#2563eb',
                                borderRadius: 6,
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true, ticks: { callback: v => '₹' + v, color: '#64748b' }, grid: { color: '#e2e8f0' } },
                                x: { ticks: { color: '#64748b' }, grid: { display: false } }
                            }
                        }
                    });
                }
            } catch (err) {
                console.error("Failed to load charts", err);
            }
        }

        /* ── Initial load ── */
        loadSummary();
        loadTransactions();
        loadCharts();
        loadSuggestions();
    </script>
</body>

</html>
