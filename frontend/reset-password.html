<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password – ExpenseTracker</title>
    <link rel="stylesheet" href="common.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: var(--bg);
        }
        .auth-wrapper {
            display: flex;
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            min-height: auto;
        }
        .auth-form-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 48px 40px;
        }
        .auth-form-panel h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .auth-form-panel .sub {
            font-size: .9rem;
            color: var(--text-muted);
            margin-bottom: 32px;
            line-height: 1.5;
        }
        .auth-form-panel form {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .auth-form-panel input {
            padding: 13px 16px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            font-size: .95rem;
            transition: border-color .2s, box-shadow .2s;
        }
        .auth-form-panel input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .auth-form-panel .btn {
            padding: 13px;
            font-size: 1rem;
            border-radius: var(--radius-sm);
            margin-top: 4px;
        }
        .auth-form-panel .form-options {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: -8px;
            margin-bottom: 4px;
        }
        .auth-form-panel .show-password-label {
            font-size: .85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .auth-form-panel .show-password-label input {
            cursor: pointer;
            margin: 0;
            width: auto;
            padding: 0;
            box-shadow: none;
        }
        .auth-footer {
            margin-top: 20px;
            text-align: center;
            font-size: .9rem;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
        .success-text {
            color: green;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-form-panel" id="panelContent">
            <h1>Create new password</h1>
            <p class="sub">Your new password must be different from previous used passwords.</p>

            <form id="resetPasswordForm">
                <input type="password" id="password" placeholder="New password" required minlength="6">
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6">
                
                <div class="form-options">
                    <label class="show-password-label">
                        <input type="checkbox" id="showPasswordToggle"> Show passwords
                    </label>
                </div>

                <div id="message" class="message"></div>
                <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
            </form>

            <div class="auth-footer">
                <a href="login.html">Back to Sign in</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('panelContent').innerHTML = `
                <h1 style="color:red">Invalid Link</h1>
                <p class="sub">The password reset link is invalid or missing. Please try requesting a new link.</p>
                <a href="forgot-password.html" class="btn btn-primary btn-full" style="text-align:center; text-decoration:none; display:block">Request New Link</a>
            `;
        } else {
            document.getElementById("showPasswordToggle").addEventListener("change", function() {
                const pwdInput = document.getElementById("password");
                const confirmPwdInput = document.getElementById("confirmPassword");
                const type = this.checked ? "text" : "password";
                pwdInput.type = type;
                confirmPwdInput.type = type;
            });

            document.getElementById("resetPasswordForm").addEventListener("submit", async function (e) {
                e.preventDefault();
                const msgEl = document.getElementById("message");
                msgEl.className = "message";
                msgEl.textContent = "";

                const password = document.getElementById("password").value;
                const confirmPassword = document.getElementById("confirmPassword").value;

                if (password !== confirmPassword) {
                    msgEl.classList.add("error");
                    msgEl.textContent = "Passwords do not match.";
                    return;
                }

                const btn = this.querySelector("button[type=submit]");
                btn.disabled = true;
                btn.textContent = "Resetting…";

                try {
                    const res = await fetch(`http://localhost:8080/api/auth/reset-password/${token}`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ password })
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        document.getElementById('panelContent').innerHTML = `
                            <h1>Password Reset Successful 🎉</h1>
                            <p class="sub" style="margin-bottom:20px;">Your password has been successfully updated. You can now sign in with your new password.</p>
                            <a href="login.html" class="btn btn-primary btn-full" style="text-align:center; text-decoration:none; display:block">Continue to Sign In</a>
                        `;
                    } else {
                        msgEl.classList.add("error");
                        msgEl.textContent = data.message || "Failed to reset password.";
                    }
                } catch {
                    msgEl.classList.add("error");
                    msgEl.textContent = "Network error. Check your connection.";
                } finally {
                    if(btn) {
                        btn.disabled = false;
                        btn.textContent = "Reset Password";
                    }
                }
            });
        }
    </script>
</body>
</html>
