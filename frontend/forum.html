<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Forum – ExpenseTracker</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="navbar.css">
    <style>
        .forum-wrap {
            max-width: 760px;
            margin: 0 auto;
        }

        /* ── Community Tabs ── */
        .community-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }

        .community-tabs::-webkit-scrollbar {
            display: none;
        }

        .community-tab {
            padding: 8px 18px;
            border-radius: 99px;
            border: 1.5px solid var(--border);
            background: var(--surface);
            font-family: var(--font);
            font-size: .85rem;
            font-weight: 600;
            color: var(--text-muted);
            cursor: pointer;
            white-space: nowrap;
            transition: all .2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .community-tab:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .community-tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }

        .community-tab .tab-count {
            font-size: .7rem;
            font-weight: 700;
            padding: 1px 7px;
            border-radius: 99px;
            background: rgba(0,0,0,.1);
        }

        .community-tab.active .tab-count {
            background: rgba(255,255,255,.25);
        }

        /* ── Create Post Card ── */
        .create-post-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 24px;
            margin-bottom: 28px;
            border: 1px solid var(--border);
            border-top: 4px solid var(--primary);
        }

        .create-post-card h2 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .create-post-card form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .create-post-card textarea {
            resize: vertical;
            min-height: 80px;
        }

        .create-post-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 12px;
            align-items: end;
        }

        /* ── Community Badge ── */
        .community-badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 99px;
            font-size: .7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .3px;
        }

        .community-badge.general    { background: #dbeafe; color: #1e40af; }
        .community-badge.budgeting  { background: #dcfce7; color: #15803d; }
        .community-badge.investing  { background: #fef3c7; color: #92400e; }
        .community-badge.savings    { background: #f0e7fe; color: #6d28d9; }
        .community-badge.tips       { background: #fce7f3; color: #be185d; }

        /* ── Feed ── */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: 24px;
            transition: box-shadow .2s;
            border: 1px solid var(--border);
        }

        .post-card:hover {
            box-shadow: var(--shadow-md);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .author-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.05rem;
        }

        .author-info {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-weight: 700;
            font-size: .9rem;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .author-role {
            font-size: .65rem;
            background: var(--primary-light);
            color: var(--primary);
            padding: 2px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .post-time {
            font-size: .8rem;
            color: var(--text-muted);
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .post-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--text);
        }

        .post-body {
            font-size: .9rem;
            line-height: 1.65;
            color: var(--text-light);
            margin-bottom: 16px;
            white-space: pre-wrap;
        }

        .post-actions {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: .88rem;
            font-weight: 600;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color .2s;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
        }

        .action-btn:hover {
            color: var(--primary);
            background: var(--primary-light);
        }

        .action-btn.liked {
            color: var(--danger);
        }

        .action-btn.liked:hover {
            background: #fef2f2;
        }

        /* ── Comments Section ── */
        .comments-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px dashed var(--border);
            display: none;
        }

        .comments-section.open {
            display: block;
        }

        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 14px;
        }

        .comment-item {
            background: var(--surface-2);
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .comment-author {
            font-size: .85rem;
            font-weight: 700;
            color: var(--text);
        }

        .comment-time {
            font-size: .75rem;
            color: var(--text-muted);
        }

        .comment-text {
            font-size: .88rem;
            color: var(--text-light);
        }

        .comment-form {
            display: flex;
            gap: 10px;
        }

        .comment-form input {
            flex: 1;
            padding: 10px 14px;
        }

        .comment-form button {
            padding: 10px 16px;
        }

        .empty-feed {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
        }

        .empty-feed .icon-wrap {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary-light);
            color: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }

        /* ── Auto-refresh indicator ── */
        .refresh-indicator {
            text-align: center;
            font-size: .75rem;
            color: var(--text-muted);
            padding: 8px;
            opacity: .6;
        }

        @media (max-width: 500px) {
            .post-card, .create-post-card {
                padding: 18px;
            }
            .create-post-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="page-content">
        <div class="forum-wrap">

            <h1 class="section-title">Community Forum</h1>
            <p style="margin-top:-12px; margin-bottom: 24px; color: var(--text-muted); font-size: .9rem;">
                Share financial tips, ask questions, and learn from the community.
            </p>

            <!-- Community Tabs -->
            <div class="community-tabs" id="communityTabs">
                <button class="community-tab active" data-community="all">All <span class="tab-count">0</span></button>
                <button class="community-tab" data-community="general">General <span class="tab-count">0</span></button>
                <button class="community-tab" data-community="budgeting">Budgeting <span class="tab-count">0</span></button>
                <button class="community-tab" data-community="investing">Investing <span class="tab-count">0</span></button>
                <button class="community-tab" data-community="savings">Savings <span class="tab-count">0</span></button>
                <button class="community-tab" data-community="tips">Tips & Tricks <span class="tab-count">0</span></button>
            </div>

            <!-- Create Post -->
            <div class="create-post-card">
                <h2>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                    Start a Discussion
                </h2>
                <form id="postForm">
                    <input type="text" id="postTitle" placeholder="Title of your post" required>
                    <textarea id="postContent" placeholder="What do you want to share or ask?" required></textarea>
                    <div class="create-post-row">
                        <div class="form-group" style="margin-bottom:0">
                            <label for="postCommunity">Community</label>
                            <select id="postCommunity">
                                <option value="general">General</option>
                                <option value="budgeting">Budgeting</option>
                                <option value="investing">Investing</option>
                                <option value="savings">Savings</option>
                                <option value="tips">Tips & Tricks</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-primary" style="height:42px;">Post to Forum</button>
                    </div>
                    <div id="postMessage" class="message"></div>
                </form>
            </div>

            <!-- Feed -->
            <div class="feed" id="feed">
                <div class="empty-feed">
                    <div class="icon-wrap">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    </div>
                    <p>Loading discussions…</p>
                </div>
            </div>

            <div class="refresh-indicator" id="refreshIndicator">Auto-refreshes every 30s</div>

        </div>
    </div>

    <script src="navbar.js"></script>
    <script>
        const token = localStorage.getItem("token");
        const currentUserId = (() => {
            try { return JSON.parse(atob(token.split('.')[1])).id; } catch { return null; }
        })();

        if (!token) window.location.href = "login.html";

        let activeCommunity = "all";

        /* ── Community Tabs ── */
        const tabsContainer = document.getElementById("communityTabs");
        tabsContainer.addEventListener("click", (e) => {
            const tab = e.target.closest(".community-tab");
            if (!tab) return;

            tabsContainer.querySelectorAll(".community-tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            activeCommunity = tab.dataset.community;
            loadFeed();
        });

        /* Load community counts */
        async function loadCommunityCounts() {
            try {
                const res = await fetch("http://localhost:5000/api/forum/communities", {
                    headers: { "Authorization": token }
                });
                const communities = await res.json();

                communities.forEach(c => {
                    const tab = tabsContainer.querySelector(`[data-community="${c.id}"]`);
                    if (tab) {
                        const countEl = tab.querySelector(".tab-count");
                        if (countEl) countEl.textContent = c.count;
                    }
                });
            } catch (e) {
                console.error("Failed to load community counts", e);
            }
        }

        /* ── Utility: Time Ago ── */
        function timeAgo(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const seconds = Math.floor((now - date) / 1000);

            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + " years ago";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + " months ago";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d ago";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h ago";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m ago";
            return "just now";
        }

        /* ── Load Feed ── */
        async function loadFeed() {
            try {
                const url = activeCommunity === "all"
                    ? "http://localhost:5000/api/forum"
                    : `http://localhost:5000/api/forum?community=${activeCommunity}`;

                const res = await fetch(url, {
                    headers: { "Authorization": token }
                });
                const posts = await res.json();
                const feedEl = document.getElementById("feed");

                if (!posts.length) {
                    feedEl.innerHTML = `
                        <div class="empty-feed">
                            <div class="icon-wrap">
                                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            </div>
                            <p>No discussions yet. Be the first to post!</p>
                        </div>
                    `;
                    return;
                }

                feedEl.innerHTML = "";
                posts.forEach(post => {
                    const hasLiked = post.likes.includes(currentUserId);
                    const likeCount = post.likes.length;
                    const commentCount = post.comments.length;
                    const initial = (post.user && post.user.name) ? post.user.name.charAt(0).toUpperCase() : "?";
                    const authorName = post.user ? post.user.name : "Unknown User";
                    const authorRole = (post.user && post.user.role === "admin") ? '<span class="author-role">admin</span>' : '';
                    const community = post.community || "general";

                    let commentsHTML = post.comments.map(c => `
                        <div class="comment-item">
                            <div class="comment-header">
                                <span class="comment-author">${c.name || "User"}</span>
                                <span class="comment-time">${timeAgo(c.createdAt)}</span>
                            </div>
                            <div class="comment-text">${c.text}</div>
                        </div>
                    `).join("");

                    if (!commentsHTML) commentsHTML = `<div class="text-muted text-small text-center" style="margin-bottom:12px">No comments yet.</div>`;

                    const heartFilled = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
                    const heartEmpty = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
                    const commentIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>';

                    feedEl.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <div class="post-author">
                                    <div class="author-avatar">${initial}</div>
                                    <div class="author-info">
                                        <div class="author-name">${authorName} ${authorRole}</div>
                                        <div class="post-time">${timeAgo(post.createdAt)}</div>
                                    </div>
                                </div>
                                <div class="post-meta">
                                    <span class="community-badge ${community}">${community}</span>
                                </div>
                            </div>

                            <h3 class="post-title">${post.title}</h3>
                            <div class="post-body">${post.content}</div>

                            <div class="post-actions">
                                <button class="action-btn ${hasLiked ? 'liked' : ''}" onclick="toggleLike('${post._id}', this)">
                                    ${hasLiked ? heartFilled : heartEmpty} <span class="like-cnt">${likeCount}</span>
                                </button>
                                <button class="action-btn" onclick="toggleComments('${post._id}')">
                                    ${commentIcon} <span>${commentCount}</span>
                                </button>
                            </div>

                            <div class="comments-section" id="comments-${post._id}">
                                <div class="comment-list" id="commentList-${post._id}">
                                    ${commentsHTML}
                                </div>
                                <form class="comment-form" onsubmit="submitComment(event, '${post._id}')">
                                    <input type="text" id="commentInput-${post._id}" placeholder="Write a comment..." required>
                                    <button type="submit" class="btn btn-primary">Post</button>
                                </form>
                            </div>
                        </div>
                    `;
                });
            } catch {
                document.getElementById("feed").innerHTML = `
                    <div class="empty-feed">
                        <div class="icon-wrap" style="background:#fef2f2; color:var(--danger);">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                        </div>
                        <p>Failed to load forum feed.</p>
                    </div>
                `;
            }
        }

        /* ── Submit Post ── */
        document.getElementById("postForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            const msgEl = document.getElementById("postMessage");
            const btn = this.querySelector("button[type=submit]");

            btn.disabled = true;
            btn.textContent = "Posting...";
            msgEl.textContent = "";

            try {
                const res = await fetch("http://localhost:5000/api/forum", {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": token },
                    body: JSON.stringify({
                        title: document.getElementById("postTitle").value,
                        content: document.getElementById("postContent").value,
                        community: document.getElementById("postCommunity").value
                    })
                });

                if (res.ok) {
                    this.reset();
                    loadFeed();
                    loadCommunityCounts();
                } else {
                    const d = await res.json();
                    msgEl.className = "message error";
                    msgEl.textContent = d.message || "Failed to post.";
                }
            } catch {
                msgEl.className = "message error";
                msgEl.textContent = "Network error.";
            } finally {
                btn.disabled = false;
                btn.textContent = "Post to Forum";
            }
        });

        /* ── Toggle Like ── */
        async function toggleLike(postId, btnEl) {
            try {
                const res = await fetch(`http://localhost:5000/api/forum/${postId}/like`, {
                    method: "PUT",
                    headers: { "Authorization": token }
                });
                if (res.ok) {
                    const data = await res.json();
                    const heartFilled = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';
                    const heartEmpty = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>';

                    if (data.liked) {
                        btnEl.classList.add("liked");
                        btnEl.innerHTML = `${heartFilled} <span class="like-cnt">${data.likes}</span>`;
                    } else {
                        btnEl.classList.remove("liked");
                        btnEl.innerHTML = `${heartEmpty} <span class="like-cnt">${data.likes}</span>`;
                    }
                }
            } catch (e) {
                console.error("Like failed", e);
            }
        }

        /* ── Toggle Comments visibility ── */
        function toggleComments(postId) {
            const section = document.getElementById(`comments-${postId}`);
            section.classList.toggle("open");
        }

        /* ── Submit Comment ── */
        async function submitComment(e, postId) {
            e.preventDefault();
            const input = document.getElementById(`commentInput-${postId}`);
            const btn = e.target.querySelector("button");
            const text = input.value.trim();
            if (!text) return;

            btn.disabled = true;

            try {
                const res = await fetch(`http://localhost:5000/api/forum/${postId}/comment`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json", "Authorization": token },
                    body: JSON.stringify({ text })
                });

                if (res.ok) {
                    loadFeed();
                }
            } catch (err) {
                alert("Failed to post comment.");
            } finally {
                btn.disabled = false;
            }
        }

        /* ── Auto-refresh every 30 seconds ── */
        setInterval(() => {
            loadFeed();
            loadCommunityCounts();
        }, 30000);

        /* ── Init ── */
        loadFeed();
        loadCommunityCounts();
    </script>
</body>

</html>
